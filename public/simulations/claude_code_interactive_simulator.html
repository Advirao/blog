<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Interactive Learning Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #FAF9F7;
    --surface:  #FFFFFF;
    --surface2: #F2EDE6;
    --border:   #E5DDD5;
    --ink:      #2D2926;
    --ink2:     #7A6F68;
    --accent:   #5E4FA0;
    --accent2:  #A8711A;
    --accent3:  #2A6E49;
    --accent4:  #B83232;
    --blue:     #2B549A;
    /* legacy aliases used in JS inline styles */
    --text:  #2D2926;
    --text2: #7A6F68;
    --text3: #7A6F68;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- HEADER --- */
  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 1.5rem;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Lora', serif;
    font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .logo span { font-weight: 400; }
  .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--ink2); letter-spacing: 0.1em; text-transform: uppercase; }
  .header-right { margin-left: auto; display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
    padding: 0.25rem 0.65rem; border-radius: 20px; border: 1px solid;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .badge-blue { color: var(--blue); border-color: rgba(43,84,154,0.3); background: rgba(43,84,154,0.07); }
  .badge-purple { color: var(--accent); border-color: rgba(94,79,160,0.3); background: rgba(94,79,160,0.07); }
  .badge-green { color: var(--accent3); border-color: rgba(42,110,73,0.3); background: rgba(42,110,73,0.07); }

  /* --- LAYOUT --- */
  .app { display: flex; max-width: 1400px; margin: 0 auto; height: calc(100vh - 80px); }

  /* --- SIDEBAR --- */
  .sidebar {
    width: 260px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.5rem 0;
    background: var(--surface);
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nav-section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; color: var(--ink2);
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 0.5rem 1.25rem 0.4rem;
    margin-top: 0.5rem;
  }
  .nav-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.6rem 1.25rem;
    cursor: pointer; transition: all 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active {
    background: rgba(94,79,160,0.08);
    border-left-color: var(--accent);
  }
  .nav-item.active .nav-label { color: var(--accent); }
  .nav-num {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
    color: var(--ink2); min-width: 18px; text-align: right;
  }
  .nav-label { font-size: 0.82rem; color: var(--ink2); }
  .nav-icon { font-size: 0.9rem; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-done {
    margin-left: auto;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent3); display: none;
  }
  .nav-item.done .nav-done { display: block; }

  /* --- MAIN --- */
  .main {
    flex: 1; overflow-y: auto;
    padding: 2.5rem 2.5rem 4rem;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* --- CONCEPT CARD --- */
  .concept-header {
    display: flex; align-items: flex-start; gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .concept-icon-big {
    font-size: 2.8rem; width: 70px; height: 70px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; flex-shrink: 0;
  }
  .concept-title { font-family: 'Lora', serif; font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; color: var(--ink); }
  .concept-tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
    color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .concept-desc { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem; color: var(--ink2); line-height: 1.6; margin-top: 0.5rem; max-width: 550px; }

  /* --- TABS --- */
  .tabs {
    display: flex; gap: 0; margin-bottom: 1.75rem;
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; background: var(--surface);
  }
  .tab-btn {
    flex: 1; padding: 0.7rem 0.5rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 500;
    color: var(--ink2); background: transparent; border: none;
    cursor: pointer; transition: all 0.2s;
    border-right: 1px solid var(--border); letter-spacing: 0.02em;
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn:hover { color: var(--ink); background: var(--surface2); }
  .tab-btn.active { color: var(--accent); background: rgba(94,79,160,0.08); border-bottom: 2px solid var(--accent); }
  .tab-btn .tab-icon { display: block; font-size: 1rem; margin-bottom: 0.2rem; }

  /* --- TAB CONTENT --- */
  .tab-panel { display: none; animation: fadeIn 0.2s ease; }
  .tab-panel.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

  /* --- WHAT IS IT --- */
  .what-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
  .info-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem;
  }
  .info-card-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem;
    color: var(--ink2); letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .info-card-content { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.88rem; line-height: 1.65; color: var(--ink2); }
  .info-card-content strong { color: var(--ink); }
  .full-width { grid-column: 1 / -1; }
  .highlight-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem;
    font-size: 0.9rem; line-height: 1.6;
  }
  .highlight-box .hl-title { font-family: 'Lora', serif; font-weight: 600; color: var(--accent); margin-bottom: 0.4rem; font-size: 0.85rem; }

  /* --- HOW TO READ --- */
  .read-steps { display: flex; flex-direction: column; gap: 0.75rem; }
  .read-step {
    display: flex; gap: 1rem; align-items: flex-start;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem 1.25rem;
  }
  .step-num {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    background: var(--accent); color: #FFFFFF; font-weight: 700;
    font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
  }
  .step-content { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.87rem; line-height: 1.6; color: var(--ink2); }
  .step-content strong { font-family: 'Lora', serif; color: var(--ink); display: block; margin-bottom: 0.2rem; }
  .code-inline {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 0.1rem 0.4rem; border-radius: 4px; color: var(--accent3);
  }

  /* --- SIMULATOR --- */
  .sim-container {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }
  .sim-toolbar {
    background: var(--surface2); padding: 0.75rem 1.25rem;
    display: flex; align-items: center; gap: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .sim-dots { display: flex; gap: 5px; }
  .sim-dot { width: 10px; height: 10px; border-radius: 50%; }
  .sim-dot-r { background: #B83232; }
  .sim-dot-y { background: #A8711A; }
  .sim-dot-g { background: #2A6E49; }
  .sim-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--ink2); margin-left: 0.5rem; }
  .sim-body { padding: 1.5rem; }

  /* Agentic Loop Sim */
  .loop-display {
    display: flex; gap: 0; margin-bottom: 1.25rem; justify-content: center;
    position: relative;
  }
  .loop-phase {
    flex: 1; text-align: center; padding: 1rem 0.5rem;
    border: 1px solid var(--border); background: var(--surface2);
    position: relative; transition: all 0.3s;
  }
  .loop-phase:not(:last-child)::after {
    content: '→'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    color: var(--ink2); z-index: 1; font-size: 0.9rem;
  }
  .loop-phase.active { background: rgba(94,79,160,0.08); border-color: var(--accent); }
  .loop-phase.active .phase-label { color: var(--accent); }
  .loop-phase.done { background: rgba(42,110,73,0.08); border-color: rgba(42,110,73,0.3); }
  .loop-phase.done .phase-label { color: var(--accent3); }
  .phase-icon { font-size: 1.4rem; display: block; margin-bottom: 0.4rem; }
  .phase-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 600; color: var(--ink2); text-transform: uppercase; letter-spacing: 0.08em; }
  .loop-log {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; min-height: 80px; color: var(--ink2);
    line-height: 1.8;
  }
  .log-line { display: flex; gap: 0.5rem; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform:none; } }
  .log-phase-tag { font-weight: 700; min-width: 70px; }
  .log-think { color: var(--accent); }
  .log-act { color: var(--accent2); }
  .log-observe { color: var(--accent3); }
  .log-decide { color: var(--blue); }
  .sim-controls { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
  .sim-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.6rem 1rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
    color: var(--ink); outline: none; min-width: 180px;
  }
  .sim-input:focus { border-color: var(--accent); }
  .sim-btn {
    padding: 0.6rem 1.25rem; border-radius: 8px; border: none;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
  }
  .btn-primary { background: var(--accent); color: #FFFFFF; }
  .btn-primary:hover { background: #7060b8; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--ink2); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--ink); background: var(--surface); }

  /* Hooks Sim */
  .hook-flow { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
  .hook-row { display: flex; align-items: center; gap: 0.75rem; }
  .hook-box {
    padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid;
    font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace;
    transition: all 0.3s; flex: 1; text-align: center;
  }
  .hook-tool { background: rgba(168,113,26,0.08); border-color: rgba(168,113,26,0.2); color: var(--accent2); }
  .hook-pre { background: rgba(184,50,50,0.08); border-color: rgba(184,50,50,0.2); color: var(--accent4); }
  .hook-post { background: rgba(42,110,73,0.08); border-color: rgba(42,110,73,0.2); color: var(--accent3); }
  .hook-arrow { color: var(--ink2); font-size: 1.2rem; }
  .hook-status {
    min-width: 70px; text-align: center; font-size: 0.7rem; font-weight: 700;
    padding: 0.3rem 0.6rem; border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .hook-pass { background: rgba(42,110,73,0.1); color: var(--accent3); }
  .hook-block { background: rgba(184,50,50,0.1); color: var(--accent4); }
  .hook-pending { background: var(--surface2); color: var(--ink2); }
  .hook-select-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .hook-scenario-btn {
    padding: 0.4rem 0.8rem; border-radius: 6px;
    font-size: 0.75rem; font-family: 'IBM Plex Mono', monospace;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--ink2); cursor: pointer; transition: all 0.2s;
  }
  .hook-scenario-btn:hover, .hook-scenario-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(94,79,160,0.08); }

  /* Tools Sim */
  .tools-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
  .tool-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.9rem; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .tool-card:hover { border-color: var(--accent); background: rgba(94,79,160,0.08); }
  .tool-card.selected { border-color: var(--accent); background: rgba(94,79,160,0.08); }
  .tool-card-icon { font-size: 1.4rem; display: block; margin-bottom: 0.4rem; }
  .tool-card-name { font-size: 0.75rem; font-weight: 600; color: var(--ink); }
  .tool-card-desc { font-size: 0.65rem; color: var(--ink2); margin-top: 0.2rem; }
  .tool-result {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
    color: var(--ink2); min-height: 70px; line-height: 1.8;
  }

  /* Files Sim */
  .file-tree {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.76rem;
    line-height: 1.9;
  }
  .file-line { cursor: pointer; padding: 0.05rem 0.3rem; border-radius: 4px; transition: background 0.15s; display: flex; align-items: center; gap: 0.4rem; }
  .file-line:hover { background: var(--surface2); }
  .file-line.selected { background: rgba(94,79,160,0.08); color: var(--accent); }
  .file-dir { color: var(--accent2); }
  .file-shared { color: var(--accent3); }
  .file-private { color: var(--accent4); }
  .file-config { color: var(--accent); }
  .file-detail {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem; margin-top: 0.75rem;
    font-size: 0.82rem; color: var(--ink2); min-height: 60px;
    display: none; animation: fadeIn 0.2s ease;
  }
  .file-detail.show { display: block; }
  .file-detail strong { color: var(--ink); display: block; margin-bottom: 0.3rem; }

  /* Git Sim */
  .git-timeline { position: relative; padding-left: 2rem; }
  .git-timeline::before { content:''; position:absolute; left:0.6rem; top:0; bottom:0; width:2px; background: var(--border); }
  .git-commit {
    position: relative; margin-bottom: 0.75rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem 1rem;
    transition: all 0.2s; cursor: pointer;
  }
  .git-commit::before {
    content:''; position:absolute; left:-1.65rem; top:50%; transform: translateY(-50%);
    width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg);
  }
  .git-commit.merged::before { background: var(--accent3); border-color: var(--accent3); }
  .git-commit:hover { border-color: var(--accent); }
  .git-hash { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--accent); }
  .git-msg { font-size: 0.82rem; color: var(--ink); margin: 0.2rem 0; }
  .git-meta { font-size: 0.68rem; color: var(--ink2); font-family: 'IBM Plex Mono', monospace; }
  .git-add-row { display: flex; gap: 0.5rem; margin-top: 1rem; }

  /* CI/CD Sim */
  .pipeline {
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .pipeline-step {
    display: flex; align-items: center; gap: 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem 1rem; transition: all 0.3s;
  }
  .pipeline-step.running { border-color: var(--accent2); background: rgba(168,113,26,0.08); }
  .pipeline-step.pass { border-color: rgba(42,110,73,0.4); background: rgba(42,110,73,0.07); }
  .pipeline-step.fail { border-color: rgba(184,50,50,0.4); background: rgba(184,50,50,0.07); }
  .pipeline-icon { font-size: 1.1rem; width: 30px; text-align: center; }
  .pipeline-name { font-weight: 600; font-size: 0.82rem; flex: 1; color: var(--ink); }
  .pipeline-detail { font-size: 0.72rem; color: var(--ink2); }
  .pipeline-status {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 700;
    padding: 0.2rem 0.6rem; border-radius: 4px;
  }
  .status-wait { background: var(--surface2); color: var(--ink2); }
  .status-run { background: rgba(168,113,26,0.15); color: var(--accent2); }
  .status-pass { background: rgba(42,110,73,0.15); color: var(--accent3); }
  .status-fail { background: rgba(184,50,50,0.15); color: var(--accent4); }

  /* Commands Sim */
  .terminal {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .terminal-bar {
    background: var(--surface2); padding: 0.6rem 1rem;
    display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .term-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--ink2); margin-left: 0.5rem; }
  .terminal-body { padding: 1rem; min-height: 140px; }
  .term-line { font-family: 'IBM Plex Mono', monospace; font-size: 0.76rem; line-height: 1.9; }
  .term-prompt { color: var(--accent3); }
  .term-cmd { color: var(--ink); }
  .term-out { color: var(--ink2); }
  .term-err { color: var(--accent4); }
  .term-success { color: var(--accent3); }
  .cmd-palette { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
  .cmd-chip {
    padding: 0.35rem 0.8rem; border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.73rem;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--ink2); cursor: pointer; transition: all 0.2s;
  }
  .cmd-chip:hover { border-color: var(--accent3); color: var(--accent3); background: rgba(42,110,73,0.07); }

  /* --- ANALOGY --- */
  .analogy-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: start; }
  .analogy-col { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .analogy-col-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--ink2); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .analogy-col-title { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; color: var(--ink); margin-bottom: 0.4rem; }
  .analogy-col-desc { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.82rem; color: var(--ink2); line-height: 1.6; }
  .analogy-arrow { font-size: 2rem; color: var(--ink2); display: flex; align-items: center; padding-top: 1.5rem; }
  .analogy-pairs { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1rem; }
  .analogy-pair {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem; align-items: center;
    font-size: 0.78rem;
  }
  .pair-left { background: rgba(168,113,26,0.08); border: 1px solid rgba(168,113,26,0.2); border-radius: 6px; padding: 0.4rem 0.7rem; color: var(--accent2); font-family: 'IBM Plex Mono', monospace; }
  .pair-right { background: rgba(94,79,160,0.08); border: 1px solid rgba(94,79,160,0.2); border-radius: 6px; padding: 0.4rem 0.7rem; color: var(--accent); font-family: 'IBM Plex Mono', monospace; }
  .pair-eq { color: var(--ink2); font-weight: 700; text-align: center; }

  /* --- EXAMPLES --- */
  .examples-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .example-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }

});

let currentConcept = 0;
let visited = new Set();

function toggleMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn = document.getElementById('sidebar-btn');
  const isOpen = sidebar.classList.contains('mobile-open');
  sidebar.classList.toggle('mobile-open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  btn.textContent = isOpen ? '☰ Menu' : '✕ Close';
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

function closeMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn = document.getElementById('sidebar-btn');
  if (!sidebar || !sidebar.classList.contains('mobile-open')) return;
  sidebar.classList.remove('mobile-open');
  overlay.classList.remove('show');
  btn.textContent = '☰ Menu';
  document.body.style.overflow = '';
}

function showConcept(idx) {
  closeMobileSidebar();
  currentConcept = idx;
  visited.add(idx);
  const c = concepts[idx];

  // Update nav
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    if (visited.has(i)) el.classList.add('done');
  });

  // Progress
  const pct = Math.round((visited.size / concepts.length) * 100);

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
    <div class="concept-header">
      <div class="concept-icon-big">${c.icon}</div>
      <div>
        <div class="concept-tag">${c.tag}</div>
        <div class="concept-title">${c.title}</div>
        <div class="concept-desc">${c.desc}</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'what')"><span class="tab-icon">💡</span>What Is It</button>
      <button class="tab-btn" onclick="switchTab(this,'read')"><span class="tab-icon">🔍</span>How to Read</button>
      <button class="tab-btn" onclick="switchTab(this,'sim')"><span class="tab-icon">🎮</span>Simulator</button>
      <button class="tab-btn" onclick="switchTab(this,'analogy')"><span class="tab-icon">🔗</span>Analogy</button>
      <button class="tab-btn" onclick="switchTab(this,'examples')"><span class="tab-icon">📝</span>Examples</button>
      <button class="tab-btn" onclick="switchTab(this,'eli10')"><span class="tab-icon">🧒</span>ELI10</button>
      <button class="tab-btn" onclick="switchTab(this,'resources')"><span class="tab-icon">📚</span>Resources</button>
    </div>
    <div id="tab-what" class="tab-panel active">${renderWhat(c)}</div>
    <div id="tab-read" class="tab-panel">${renderRead(c)}</div>
    <div id="tab-sim" class="tab-panel">${renderSim(c)}</div>
    <div id="tab-analogy" class="tab-panel">${renderAnalogy(c)}</div>
    <div id="tab-examples" class="tab-panel">${renderExamples(c)}</div>
    <div id="tab-eli10" class="tab-panel">${renderELI10(c)}</div>
    <div id="tab-resources" class="tab-panel">${renderResources(c)}</div>
    <div class="nav-bottom">
      ${idx > 0 ? `<button class="nav-bottom-btn" onclick="showConcept(${idx-1})">← Previous</button>` : '<span></span>'}
      ${idx < concepts.length-1 ? `<button class="nav-bottom-btn primary" onclick="showConcept(${idx+1})">Next →</button>` : '<button class="nav-bottom-btn primary" onclick="showConcept(0)">🎉 Start Over</button>'}
    </div>
  `;
  main.scrollTop = 0;
  initSim(c);
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

let loopRunning = false;
function runLoop() {
  if (loopRunning) return;
  loopRunning = true;
  const task = document.getElementById('loop-task').value.trim();
  const steps = loopScenarios[task] || loopScenarios['default'];
  const log = document.getElementById('loop-log');
  log.innerHTML = '';
  resetPhases();
  let i = 0;
  function next() {
    if (i >= steps.length) { loopRunning = false; return; }
    const s = steps[i];
    setPhase(s.phase);
    const line = document.createElement('div');
    line.className = 'log-line';
    const colorMap = {think:'log-think', act:'log-act', observe:'log-observe', decide:'log-decide'};
    const labelMap = {think:'[THINK]', act:'[ACT]  ', observe:'[OBS]  ', decide:'[DONE] '};
    line.innerHTML = `<span class="log-phase-tag ${colorMap[s.phase]}">${labelMap[s.phase]}</span><span>${s.msg}</span>`;
    log.appendChild(line);
    i++;
    setTimeout(next, 900);
  }
  next();
}

function resetLoop() {
  loopRunning = false;
  resetPhases();
  document.getElementById('loop-log').innerHTML = '<span style="color:var(--text3)">Enter a task below and click Run to watch the agentic loop in action...</span>';
}

function resetPhases() {
  ['think','act','observe','decide'].forEach(p => {
    const el = document.getElementById('lp-'+p);
    if (el) { el.classList.remove('active','done'); }
  });
}

function setPhase(p) {
  const order = ['think','act','observe','decide'];
  const idx = order.indexOf(p);
  order.forEach((ph, i) => {
    const el = document.getElementById('lp-'+ph);
    if (!el) return;
    el.classList.remove('active','done');
    if (i < idx) el.classList.add('done');
    if (i === idx) el.classList.add('active');

function runHookScenario(i) {
  const scenarios = [
    {pre:'PASS', tool:'PASS', post:'PASS', note:'✓ Safe command — PreToolUse hook allows it (exit 0)\n✓ Tool executes: pip install requests\n✓ PostToolUse hook validates output'},
    {pre:'BLOCK', tool:'—', post:'—', note:'✗ PreToolUse hook detected "rm -rf" pattern\n✗ Hook exits with code 1 — action BLOCKED\n✗ Tool never executes. No harm done.'},
    {pre:'PASS', tool:'PASS', post:'PASS', note:'✓ Write allowed — no dangerous patterns\n✓ File written: user.py created\n✓ PostToolUse hook auto-runs: pytest -q (2 passed)'},
    {pre:'BLOCK', tool:'—', post:'—', note:'✗ PreToolUse hook detected "sudo" command\n✗ Elevated permissions require explicit user approval\n✗ Hook exits 1 — Claude pauses and asks you first'},
  ];
  document.querySelectorAll('.hook-scenario-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
  const s = scenarios[i];
  const setPre = s.pre === 'BLOCK' ? 'hook-block' : 'hook-pass';
  const setTool = s.tool === 'PASS' ? 'hook-pass' : 'hook-pending';
  const setPost = s.post === 'PASS' ? 'hook-pass' : 'hook-pending';
  document.getElementById('hs-pre').className = 'hook-status ' + setPre;
  document.getElementById('hs-pre').innerText = s.pre;
  document.getElementById('hs-tool').className = 'hook-status ' + setTool;
  document.getElementById('hs-tool').innerText = s.tool;
  document.getElementById('hs-post').className = 'hook-status ' + setPost;
  document.getElementById('hs-post').innerText = s.post;
  document.getElementById('hook-result').innerText = s.note;
}

async function callSDK() {
  const prompt = document.getElementById('sdk-prompt').value;
  document.getElementById('sdk-request').innerHTML = `<span class="code-key">client</span>.messages.create({\n  model: <span class="code-str">"claude-sonnet-4-5"</span>,\n  max_tokens: <span class="code-num">1024</span>,\n  messages: [{\n    role: <span class="code-str">"user"</span>,\n    content: <span class="code-str">"${prompt.replace(/"/g, '\\"')}"</span>\n  }]\n})`;
  document.getElementById('sdk-response').innerText = '⏳ Calling Claude API...';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{role: 'user', content: prompt}]
      })
    });
    const data = await res.json();
    const text = data.content && data.content[0] && data.content[0].text ? data.content[0].text : JSON.stringify(data);
    document.getElementById('sdk-response').innerText = text;
  } catch(e) {
    document.getElementById('sdk-response').innerText = 'API call complete. In a real environment with your API key set, Claude\'s response would appear here.\n\nThis simulator shows you the SDK call structure — the actual response requires your ANTHROPIC_API_KEY.';
  }
}

let ciRunning = false;
function runCICD(pass) {
  if (ciRunning) return;
  ciRunning = true;
  resetCICD();
  const failAt = pass ? -1 : 4; // fail at pytest step
  let i = 0;
  function next() {
    if (i >= 6) {
      ciRunning = false;
      document.getElementById('cicd-result').innerText = pass
        ? '✅ All 6 steps passed! Green checkmark on your PR. Safe to merge to main.'
        : '❌ Pipeline failed at: Run tests (pytest)\n2 tests failed: test_login_invalid_password, test_register_duplicate_email\nFix the failures, push again — CI re-runs automatically.';
      return;
    }
    const el = document.getElementById(`ps-${i}`);
    const st = document.getElementById(`pst-${i}`);
    el.className = 'pipeline-step running';
    st.className = 'pipeline-status status-run';
    st.innerText = 'running...';
    setTimeout(() => {
      if (i === failAt) {
        el.className = 'pipeline-step fail';
        st.className = 'pipeline-status status-fail';
        st.innerText = 'FAILED';
        for (let j = i+1; j < 6; j++) {
          document.getElementById(`pst-${j}`).innerText = 'skipped';
        }
        ciRunning = false;
        document.getElementById('cicd-result').innerText = '❌ Pipeline failed at: Run tests (pytest)\n2 tests failed: test_login_invalid_password, test_register_duplicate_email\nFix the failures, push again — CI re-runs automatically.';
        return;
      }
      el.className = 'pipeline-step pass';
      st.className = 'pipeline-status status-pass';
      st.innerText = 'PASS ✓';
      i++;
      setTimeout(next, 600);
    }, 800);
  }
  next();
}

function resetCICD() {
  ciRunning = false;
  for (let i = 0; i < 6; i++) {
    document.getElementById(`ps-${i}`).className = 'pipeline-step';
    const st = document.getElementById(`pst-${i}`);
    st.className = 'pipeline-status status-wait';
    st.innerText = 'waiting';
  }
  document.getElementById('cicd-result').innerHTML = '<span style="color:var(--text3)">Click a button above to simulate a CI/CD run...</span>';
}

  const v = id => document.getElementById(id).value.trim();
  const out = `# ${v('cmd-overview').split('\n')[0].slice(0,50) || 'My Project'}\n\n## Project Overview\n${v('cmd-overview')}\n\n## Tech Stack\n${v('cmd-stack')}\n\n## Key Commands\n\`\`\`bash\n${v('cmd-commands')}\n\`\`\`\n\n## Team Rules\n${v('cmd-rules')}`;
  document.getElementById('claudemd-out').innerText = out;
}

function renderSkillsSim() {
  const templates = [
    { name:'Flask Conventions', content: '# Flask Conventions\n\n## Route Pattern\nAlways use Blueprints.\nRegister in app/__init__.py.\n\n## Auth Pattern\nAll protected routes use @jwt_required().\nReturn 401 JSON error, never redirect.\n\n## Error Handling\nCatch all exceptions. Return:\nreturn jsonify({"error": str(e)}), 500' },
    { name:'Anti-Patterns', content: '# Never Do These\n\n- Never use raw SQL strings\n- Never commit secrets to git\n- Never return plain text errors\n- Never skip @jwt_required() on writes\n- Never use print() for logging\n- Never delete migrations once applied' },
    { name:'Test Patterns', content: '# Testing Conventions\n\n## Fixture Pattern\nUse conftest.py for shared fixtures.\napp fixture creates test Flask app.\nclient fixture creates test HTTP client.\n\n## Naming\ntest_feature_scenario_expected_result\nExample: test_login_invalid_password_returns_401' },
  ];
  let btns = templates.map((t,i) => `<button class="hook-scenario-btn" onclick="loadSkillTemplate(${i})">${t.name}</button>`).join('');
  return `
    <div class="sim-container">
      <div class="sim-toolbar">
        <div class="sim-dots"><div class="sim-dot sim-dot-r"></div><div class="sim-dot sim-dot-y"></div><div class="sim-dot sim-dot-g"></div></div>
        <span class="sim-title">Skill File Builder — write a skill and preview it</span>
      </div>
      <div class="sim-body">
        <div class="hook-select-row" style="margin-bottom:0.75rem;">${btns}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <div class="info-card-label" style="margin-bottom:0.4rem;">Write your SKILL.md</div>
            <textarea class="sim-input" id="skill-editor" style="width:100%;min-height:200px;resize:vertical;padding:0.75rem;font-size:0.73rem;font-family:'IBM Plex Mono',monospace;" placeholder="# My Skill\n\nWrite markdown here. Claude will read this to learn your project's conventions...">${templates[0].content}</textarea>
          </div>
          <div>
            <div class="info-card-label" style="margin-bottom:0.4rem;">Claude reads this as...</div>
            <div class="tool-result" id="skill-preview" style="min-height:200px;white-space:pre-wrap;">${templates[0].content}</div>
          </div>
        </div>
        <button class="sim-btn btn-primary" onclick="previewSkill()" style="margin-top:0.75rem;">Preview →</button>
      </div>
    </div>`;
}

function loadSkillTemplate(i) {
  const templates = [
    '# Flask Conventions\n\n## Route Pattern\nAlways use Blueprints.\nRegister in app/__init__.py.\n\n## Auth Pattern\nAll protected routes use @jwt_required().\nReturn 401 JSON error, never redirect.\n\n## Error Handling\nCatch all exceptions. Return:\nreturn jsonify({"error": str(e)}), 500',
    '# Never Do These\n\n- Never use raw SQL strings\n- Never commit secrets to git\n- Never return plain text errors\n- Never skip @jwt_required() on writes\n- Never use print() for logging\n- Never delete migrations once applied',
    '# Testing Conventions\n\n## Fixture Pattern\nUse conftest.py for shared fixtures.\napp fixture creates test Flask app.\nclient fixture creates test HTTP client.\n\n## Naming\ntest_feature_scenario_expected_result\nExample: test_login_invalid_password_returns_401',
  ];
  document.getElementById('skill-editor').value = templates[i];
  document.getElementById('skill-preview').innerText = templates[i];
  document.querySelectorAll('.hook-scenario-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
}

function previewSkill() {
  const val = document.getElementById('skill-editor').value;
  document.getElementById('skill-preview').innerText = val;
}

function initSim(c) {
  // nothing extra needed — sims are self-contained
}

// Init
showConcept(0);
